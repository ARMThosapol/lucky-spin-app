name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-size: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install Dependencies
        run: |
          npm install
          npm install -g @capacitor/cli @capacitor/core @capacitor/android

      - name: Create Web Distribution Directory
        run: |
          mkdir -p dist
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Spin</title></head><body><div id="root"></div><script type="module" src="/src/main.tsx"></script></body></html>' > dist/index.html

      - name: Init and Sync Capacitor
        run: |
          npx cap init "EUA ARM Lucky Spin" "com.euaarm.luckyspin" --web-dir=dist
          npx cap add android
          npx cap sync

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lucky-Spin-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
